[build]
builder = "NIXPACKS"
buildCommand = "pnpm install && BASE_PATH=/ pnpm --filter @workspace/web build && pnpm --filter @workspace/api-server build && pnpm --filter @workspace/db push"

[deploy]
startCommand = "node artifacts/api-server/dist/index.cjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
