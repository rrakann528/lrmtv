<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>LrmTV</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#06B6D4" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LrmTV" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <!-- Prevents white flash in dark-mode browsers before CSS loads -->
    <meta name="color-scheme" content="dark" />

    <!--
      Non-render-blocking font loading:
      Preconnect early, then load the stylesheet as 'print' (never blocks rendering),
      switching to 'all' once loaded. Falls back for noscript environments.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>

    <!-- Instant dark background — prevents white flash before CSS is parsed -->
    <style>html,body,#root{background:#0a0a0a;margin:0;padding:0}</style>

    <!-- Global error display — shows JS errors on screen instead of black screen -->
    <script>
      function showErr(msg) {
        document.body.innerHTML =
          '<div style="color:#fff;background:#0f0f1a;padding:24px;font-family:monospace;min-height:100vh;word-break:break-all">' +
          '<h2 style="color:#f87171;margin:0 0 12px">خطأ — JS Error</h2>' +
          '<pre style="color:#fca5a5;white-space:pre-wrap;font-size:13px">' + msg + '</pre>' +
          '<button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:#06b6d4;color:#fff;border:none;border-radius:8px;cursor:pointer">إعادة المحاولة</button>' +
          '</div>';
      }
      window.addEventListener('error', function(e) {
        showErr((e.message || 'Unknown error') + '\n' + (e.filename || '') + ':' + (e.lineno || ''));
      });
      window.addEventListener('unhandledrejection', function(e) {
        showErr('Unhandled rejection:\n' + String(e.reason));
      });
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Adcash Autotag -->
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
    <script type="text/javascript">
      aclib.runAutoTag({ zoneId: 'tf80ahdgu8' });
    </script>
  </body>
</html>
