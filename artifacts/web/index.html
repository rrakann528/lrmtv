<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>LrmTV</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#06B6D4" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LrmTV" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta name="color-scheme" content="dark" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>

    <style>html,body,#root{background:#0a0a0a;margin:0;padding:0}</style>

    <!-- Ad setup: must run BEFORE aclib.js loads -->
    <script>
      /* ── Suppress all aclib/ad-network errors so Vite overlay never fires ── */
      window.onerror = function() { return true; };
      window.addEventListener('unhandledrejection', function(e) { e.preventDefault(); });

      /* ── Globals aclib expects on the page ── */
      var ua = navigator.userAgent;
      window.isIos     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      window.isSafari  = /^((?!chrome|android).)*safari/i.test(ua);
      window.isAndroid = /android/i.test(ua);

      /* ── Smart pop-under protection ──
           Block window.open for external URLs UNLESS the last click/touch
           was directly inside an element marked [data-ad-zone].
           This means banner ad clicks still open their landing page,
           but clicking chat / buttons / video NEVER opens a pop-under.        ── */
      (function() {
        var _open = window.open.bind(window);
        var _inAdZone = false;

        function trackZone(e) {
          _inAdZone = !!(e.target && e.target.closest && e.target.closest('[data-ad-zone]'));
        }
        document.addEventListener('mousedown',  trackZone, true);
        document.addEventListener('touchstart', trackZone, { capture: true, passive: true });

        window.open = function(url, name, features) {
          if (!url || url === '' || url === 'about:blank') return _open(url, name, features);
          try {
            if (new URL(url, location.href).origin === location.origin) return _open(url, name, features);
          } catch(_) {}
          if (_inAdZone) return _open(url, name, features);
          return null; // block pop-under
        };
      })();
    </script>

    <!-- aclib ad library -->
    <script id="aclib" src="//acscdn.com/script/aclib.js"></script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
