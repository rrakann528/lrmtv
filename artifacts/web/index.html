<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>LrmTV</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#06B6D4" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LrmTV" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <!-- Prevents white flash in dark-mode browsers before CSS loads -->
    <meta name="color-scheme" content="dark" />

    <!--
      Non-render-blocking font loading:
      Preconnect early, then load the stylesheet as 'print' (never blocks rendering),
      switching to 'all' once loaded. Falls back for noscript environments.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>

    <!-- Instant dark background — prevents white flash before CSS is parsed -->
    <style>html,body,#root{background:#0a0a0a;margin:0;padding:0}</style>

    <!-- Suppress third-party ad errors + block pop-under click-hijacking -->
    <script>
      /* Suppress aclib internal crashes (obfuscated private-field errors) */
      window.onerror = function(msg) {
        if (typeof msg === 'string' && (msg.indexOf('_0x') !== -1 || msg.indexOf('#b') !== -1 || msg.indexOf('aclib') !== -1)) {
          return true; // prevent Vite overlay + browser error
        }
      };
      window.addEventListener('unhandledrejection', function(e) {
        var msg = String(e && e.reason ? (e.reason.message || e.reason) : '');
        if (msg.indexOf('_0x') !== -1 || msg.indexOf('aclib') !== -1 || msg.indexOf('acscdn') !== -1 || msg.indexOf('#b') !== -1) {
          e.preventDefault();
        }
      });
      /* Block pop-under: override window.open so ad libs cannot open new tabs */
      (function() {
        var _open = window.open.bind(window);
        window.open = function(url, name, features) {
          if (typeof url === 'string' && url !== '' && !url.startsWith(location.origin)) {
            return null;
          }
          return _open(url, name, features);
        };
      })();
      /* Globals aclib expects */
      var ua = navigator.userAgent;
      window.isIos     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      window.isSafari  = /^((?!chrome|android).)*safari/i.test(ua);
      window.isAndroid = /android/i.test(ua);
    </script>

    <!-- Adcash library — loaded once, used by banner + interstitial components -->
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
