<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' width='192' height='192'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#0D0D0E'/>
      <stop offset='100%' style='stop-color:#1A1A1E'/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width='512' height='512' rx='110' fill='url(#bg)'/>
  <!-- TV icon (lucide Tv), scaled and centered -->
  <g transform='translate(256,220) scale(10)' stroke='#06B6D4' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'>
    <rect x='-11' y='-6' width='22' height='16' rx='2'/>
    <polyline points='-4,-9 0,-5 4,-9'/>
  </g>
  <!-- LrmTV text -->
  <text x='256' y='420' font-family='Arial Black,Arial,sans-serif' font-size='100' font-weight='900' text-anchor='middle' fill='#06B6D4'>LrmTV</text>
</svg>
